spring:
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        instance-id: api-gateway-service

config:
  service-name: api-gateway-service
  api:
    authn: localhost:9001
    author: localhost:9002
    user: localhost:9003
    # authn: localhost:8081
    # author: localhost:8082
    # charge: localhost:8083
    # config: localhost:8084
    # customer: localhost:8085
    # device: localhost:8086
    # location: localhost:8087
    # marketing: localhost:8088
    # notification: localhost:8089
    # payment: localhost:8090
    # point: localhost:8091
    # report: localhost:8092
    # user: localhost:8093

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  show-actuator: false
  swagger-ui:
    urls:
      - name: api-gateway-service
        url: /v3/api-docs
      - name: authentication-service
        url: /swagger-authn/v3/api-docs
      - name: authorization-service
        url: /swagger-author/v3/api-docs
      - name: admin-bff-service
        url: /swagger-admin/v3/api-docs
      