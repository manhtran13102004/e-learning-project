spring:
  cloud:
    consul:
      enabled: true
      discovery:
        enabled: true
      host: 10.38.61.144
      port: 8500

config:
  service-name: admin-bff-service
  api:
    authn: 10.38.61.144:8081

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  show-actuator: false
  swagger-ui:
    urls:
      - name: api-gateway-service
        url: /v3/api-docs
      - name: authentication-service
        url: /swagger-authn/v3/api-docs
      - name: authorization-service
        url: /swagger-author/v3/api-docs