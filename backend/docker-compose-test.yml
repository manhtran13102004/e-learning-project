name: ev-test-stack

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: postgres-test
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - test-postgres-data:/var/lib/postgresql/data
      - ./docker/test-initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-network

  redis-test:
    image: redis:7-alpine
    container_name: redis-test
    ports:
      - "6380:6379"
    networks:
      - test-network

  consul-test:
    image: hashicorp/consul:1.19
    container_name: consul-test
    command: agent -dev -client=0.0.0.0
    ports:
      - "8501:8500"
    networks:
      - test-network

  kafka-test:
    image: apache/kafka:latest
    container_name: kafka-test
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-test:29092,PLAINTEXT_HOST://localhost:9093'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
    networks:
      - test-network

  service1:
    container_name: service1-test
    build:
      context: ./service1
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres-test
      DATABASE_PORT: 5432
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      CONSUL_HOST: consul-test
      CONSUL_PORT: 8500
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-test:29092
    ports:
      - "8094:8094"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_started
      consul-test:
        condition: service_started
      kafka-test:
        condition: service_started
    networks:
      - test-network

  service2:
    container_name: service2-test
    build:
      context: ./service2
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres-test
      DATABASE_PORT: 5432
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      CONSUL_HOST: consul-test
      CONSUL_PORT: 8500
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-test:29092
    ports:
      - "8095:8095"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_started
      consul-test:
        condition: service_started
      kafka-test:
        condition: service_started
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  test-postgres-data:
