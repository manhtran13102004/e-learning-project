server:
  prefix: "service1"

spring:
  cloud:
    consul:
      host: ${CONSUL_HOST}
      port: ${CONSUL_PORT}
  datasource:
    driver-class-name: ${DATABASE_DRIVER}
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/service1_db
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

management:
  health:
    redis:
      enabled: false

config:
  api:
    whiteList:
      - /api/**
      - /send/**
  # TODO: thay bằng Inbox riêng của bạn tại mailtrap.io -> Email Testing -> Inboxes -> SMTP Settings
  mail:
    host: ${MAILTRAP_HOST}
    port: ${MAILTRAP_PORT}
    username: ${MAILTRAP_USERNAME}
    password: ${MAILTRAP_PASSWORD}

springdoc:
  paths-to-match: /**
